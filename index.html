<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Рабочая программа времени</title>
  <style>
    :root {
      --camouflage-1: rgba(16, 102, 58, 0.9);
      --camouflage-2: rgba(56, 148, 101, 0.86);
      --camouflage-3: rgba(132, 198, 122, 0.8);

      --board: rgba(171, 33, 45, 0.64);
      --board-dark: rgba(126, 22, 31, 0.68);
      --board-light: rgba(199, 66, 75, 0.54);

      --glass: rgba(255, 255, 255, 0.16);
      --glass-strong: rgba(255, 255, 255, 0.26);
      --glass-border: rgba(255, 255, 255, 0.32);
      --neon-green: #00ff88;
      --neon-blue: #00d4ff;
      --neon-yellow: #ffeb3b;

      --text: #f8f8f8;
      --text-dark: #1c1c1c;
      --shadow: 0 22px 55px rgba(0, 0, 0, 0.28);
      --soft-shadow: 0 12px 28px rgba(0, 0, 0, 0.18);
      --radius-xl: 36px;
      --radius-lg: 26px;
      --radius-md: 20px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 12% 12%, var(--camouflage-3) 0 5%, transparent 5.5%),
        radial-gradient(circle at 24% 10%, var(--camouflage-1) 0 6%, transparent 6.5%),
        radial-gradient(circle at 37% 18%, var(--camouflage-2) 0 7%, transparent 7.5%),
        radial-gradient(circle at 52% 10%, var(--camouflage-3) 0 6%, transparent 6.5%),
        radial-gradient(circle at 66% 9%, var(--camouflage-1) 0 7%, transparent 7.5%),
        radial-gradient(circle at 81% 14%, var(--camouflage-2) 0 6%, transparent 6.5%),
        radial-gradient(circle at 95% 8%, var(--camouflage-1) 0 7%, transparent 7.5%),
        linear-gradient(180deg, #c3e4c0 0%, #8cc985 100%);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2vh;
    }

    .board {
      width: 98vw;
      height: 96vh;
      background: 
        linear-gradient(135deg, var(--board-light), var(--board) 42%, var(--board-dark)),
        var(--glass);
      border-radius: var(--radius-xl);
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow);
      padding: 2.2vh 2.2vw 2vh;
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      gap: 2vh;
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      position: relative;
      overflow: hidden;
    }

    .board::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
      animation: neon-glow 3s ease-in-out infinite alternate;
    }

    @keyframes neon-glow {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    .top-row,
    .time-row,
    .bottom-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.8vw;
      align-items: center;
    }

    .label-box,
    .date-box,
    .btn {
      background: 
        linear-gradient(145deg, 
          rgba(255, 255, 255, 0.12), 
          rgba(255, 255, 255, 0.06)
        ),
        var(--glass);
      border: 1px solid var(--glass-border);
      box-shadow: 
        var(--soft-shadow),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .label-box,
    .date-box {
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .label-box:hover,
    .date-box:hover,
    .btn:hover {
      transform: translateY(-3px);
      background: 
        linear-gradient(145deg, 
          rgba(255, 255, 255, 0.22), 
          rgba(255, 255, 255, 0.1)
        );
      box-shadow: 
        0 20px 36px rgba(0, 0, 0, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.4);
    }

    .label-box {
      min-height: 13vh;
      padding: 1vh 1vw;
      font-size: clamp(24px, 2.05vw, 44px);
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: 0.01em;
      color: #ffffff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.26);
    }

    .time-row {
      align-items: center;
      min-height: 34vh;
    }

    .time-value {
      color: #ffffff;
      font-size: clamp(56px, 5.7vw, 116px);
      font-weight: 800;
      line-height: 1;
      text-align: center;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.03em;
      text-shadow: 
        0 4px 18px rgba(0, 0, 0, 0.36),
        0 0 20px rgba(255, 255, 255, 0.2);
      user-select: none;
    }

    .date-box {
      min-height: 15vh;
      padding: 1vh 1vw;
      flex-direction: column;
      gap: 0.6vh;
    }

    .date-main {
      font-size: clamp(24px, 1.8vw, 38px);
      font-weight: 700;
      line-height: 1.08;
      color: #ffffff;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.22);
    }

    .date-extra {
      font-size: clamp(16px, 1vw, 24px);
      font-weight: 600;
      color: rgba(255, 255, 255, 0.88);
      line-height: 1.2;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 1vw;
      flex-wrap: nowrap;
      align-items: center;
    }

    .btn {
      min-width: 14vw;
      min-height: 8.2vh;
      padding: 0.9vh 1.2vw;
      border-radius: 22px;
      color: #ffffff;
      font-size: clamp(22px, 1.5vw, 32px);
      font-weight: 800;
      cursor: pointer;
      outline: none;
      position: relative;
      overflow: hidden;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn:active {
      transform: translateY(1px) scale(0.98);
    }

    .btn:focus,
    .btn.is-focused {
      box-shadow: 
        0 0 0 6px rgba(0, 212, 255, 0.4),
        0 0 28px rgba(0, 212, 255, 0.6),
        var(--soft-shadow);
      transform: translateY(-2px) scale(1.02);
    }

    .btn:disabled {
      opacity: 0.48;
      cursor: default;
      transform: none;
    }

    .status-line {
      color: rgba(255, 255, 255, 0.94);
      text-align: center;
      font-size: clamp(18px, 1.15vw, 26px);
      font-weight: 700;
      line-height: 1.2;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.28);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.94; }
      50% { opacity: 1; }
    }

    @media (max-aspect-ratio: 16/9) {
      .board { height: 97vh; }
      .label-box { min-height: 11.5vh; }
      .time-row { min-height: 28vh; }
      .date-box { min-height: 13.5vh; }
    }
  </style>
</head>
<body>
  <main class="board">
    <section class="top-row" aria-label="Названия блоков">
      <div class="label-box">Астрономическое<br>время</div>
      <div class="label-box">Местное время</div>
      <div class="label-box">Оперативное<br>время</div>
    </section>

    <section class="time-row" aria-label="Показания времени">
      <div class="time-value" id="utcTime">00:00:00</div>
      <div class="time-value" id="localTime">00:00:00</div>
      <div class="time-value" id="uptimeTime">00:00:00</div>
    </section>

    <section class="bottom-row" aria-label="Поля с датой">
      <div class="date-box">
        <div class="date-main" id="utcDateMain">—</div>
        <div class="date-extra" id="utcDateExtra">—</div>
      </div>
      <div class="date-box">
        <div class="date-main" id="localDateMain">—</div>
        <div class="date-extra" id="localDateExtra">—</div>
      </div>
      <div class="date-box">
        <div class="date-main" id="uptimeDateMain">—</div>
        <div class="date-extra" id="uptimeDateExtra">—</div>
      </div>
    </section>

    <section class="controls" aria-label="Кнопки управления">
      <button class="btn" id="startBtn" type="button" tabindex="0">Старт</button>
      <button class="btn" id="stopBtn" type="button" tabindex="0">Стоп</button>
      <button class="btn" id="resetBtn" type="button" tabindex="0">Сброс</button>
    </section>

    <div class="status-line" id="statusLine">Статус оперативного времени: активный отсчёт</div>
  </main>

  <script>

      var utcTime = document.getElementById('utcTime');
      var localTime = document.getElementById('localTime');
      var uptimeTime = document.getElementById('uptimeTime');
      var uptimeDateMain = document.getElementById('uptimeDateMain');
      var uptimeDateExtra = document.getElementById('uptimeDateExtra');
      var statusLine = document.getElementById('statusLine');

      var start
