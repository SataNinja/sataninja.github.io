    :root {
      --camouflage-1: #0b5a31;
      --camouflage-2: #2e8b57;
      --camouflage-3: #84c67a;
      --board: #ff1823;
      --panel: #f4f4f4;
      --panel-border: #cfcfcf;
      --text: #121212;
      --white: #ffffff;
      --focus: #ffe566;
      --shadow: 0 10px 26px rgba(0, 0, 0, 0.18);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 10% 12%, var(--camouflage-3) 0 5%, transparent 5.5%),
        radial-gradient(circle at 22% 10%, var(--camouflage-1) 0 6%, transparent 6.5%),
        radial-gradient(circle at 35% 17%, var(--camouflage-2) 0 7%, transparent 7.5%),
        radial-gradient(circle at 50% 10%, var(--camouflage-3) 0 6%, transparent 6.5%),
        radial-gradient(circle at 65% 9%, var(--camouflage-1) 0 7%, transparent 7.5%),
        radial-gradient(circle at 80% 14%, var(--camouflage-2) 0 6%, transparent 6.5%),
        radial-gradient(circle at 94% 8%, var(--camouflage-1) 0 7%, transparent 7.5%),
        linear-gradient(180deg, #afdca9 0%, #8dc787 100%);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2vh;
    }

    .board {
      width: 98vw;
      height: 96vh;
      background: var(--board);
      box-shadow: var(--shadow);
      padding: 2.3vh 2.1vw 2vh;
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      gap: 2.2vh;
    }

    .top-row,
    .time-row,
    .bottom-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2.4vw;
      align-items: center;
    }

    .label-box,
    .date-box {
      background: var(--panel);
      border: 2px solid var(--panel-border);
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .label-box {
      min-height: 14vh;
      padding: 1vh 1vw;
      font-size: clamp(24px, 2.1vw, 44px);
      font-weight: 700;
      line-height: 1.08;
    }

    .time-row {
      align-items: center;
      min-height: 34vh;
    }

    .time-value {
      color: var(--white);
      font-size: clamp(56px, 5.6vw, 112px);
      font-weight: 700;
      line-height: 1;
      text-align: center;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
      text-shadow: 0 3px 10px rgba(0, 0, 0, 0.24);
      user-select: none;
    }

    .date-box {
      min-height: 16vh;
      padding: 1vh 1vw;
      flex-direction: column;
      gap: 0.6vh;
    }

    .date-main {
      font-size: clamp(24px, 1.8vw, 38px);
      font-weight: 700;
      line-height: 1.08;
    }

    .date-extra {
      font-size: clamp(16px, 1vw, 24px);
      font-weight: 600;
      color: #424242;
      line-height: 1.2;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 1.1vw;
      flex-wrap: nowrap;
      align-items: center;
    }

    .btn {
      min-width: 14vw;
      min-height: 8.5vh;
      padding: 0.9vh 1.2vw;
      border: 3px solid #d9d9d9;
      background: #f6f6f6;
      color: #121212;
      font-size: clamp(22px, 1.5vw, 32px);
      font-weight: 700;
      cursor: pointer;
      outline: none;
    }

    .btn:focus,
    .btn.is-focused {
      border-color: var(--focus);
      box-shadow: 0 0 0 6px rgba(255, 229, 102, 0.42);
      transform: scale(1.02);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: default;
    }

    .status-line {
      color: #fff7f7;
      text-align: center;
      font-size: clamp(18px, 1.15vw, 26px);
      font-weight: 700;
      line-height: 1.2;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.22);
    }

    @media (max-aspect-ratio: 16/9) {
      .board { height: 97vh; }
      .label-box { min-height: 12vh; }
      .time-row { min-height: 28vh; }
      .date-box { min-height: 14vh; }
    }
  </style>
</head>
<body>
  <main class="board">
    <section class="top-row" aria-label="Названия блоков">
      <div class="label-box">Астрономическое<br>время</div>
      <div class="label-box">Местное время</div>
      <div class="label-box">Оперативное<br>время</div>
    </section>

    <section class="time-row" aria-label="Показания времени">
      <div class="time-value" id="utcTime">00:00:00</div>
      <div class="time-value" id="localTime">00:00:00</div>
      <div class="time-value" id="uptimeTime">00:00:00</div>
    </section>

    <section class="bottom-row" aria-label="Поля с датой">
      <div class="date-box">
        <div class="date-main" id="utcDateMain">—</div>
        <div class="date-extra" id="utcDateExtra">—</div>
      </div>
      <div class="date-box">
        <div class="date-main" id="localDateMain">—</div>
        <div class="date-extra" id="localDateExtra">—</div>
      </div>
      <div class="date-box">
        <div class="date-main" id="uptimeDateMain">—</div>
        <div class="date-extra" id="uptimeDateExtra">—</div>
      </div>
    </section>

    <section class="controls" aria-label="Кнопки управления">
      <button class="btn" id="startBtn" type="button" tabindex="0">Старт</button>
      <button class="btn" id="stopBtn" type="button" tabindex="0">Стоп</button>
      <button class="btn" id="resetBtn" type="button" tabindex="0">Сброс</button>
    </section>

    <div class="status-line" id="statusLine">Статус оперативного времени: активный отсчёт</div>
  </main>

  <script>
    (function () {
      var utcTime = document.getElementById('utcTime');
      var localTime = document.getElementById('localTime');
      var uptimeTime = document.getElementById('uptimeTime');

      var utcDateMain = document.getElementById('utcDateMain');
      var utcDateExtra = document.getElementById('utcDateExtra');
      var localDateMain = document.getElementById('localDateMain');
      var localDateExtra = document.getElementById('localDateExtra');
      var uptimeDateMain = document.getElementById('uptimeDateMain');
      var uptimeDateExtra = document.getElementById('uptimeDateExtra');

      var startBtn = document.getElementById('startBtn');
      var stopBtn = document.getElementById('stopBtn');
      var resetBtn = document.getElementById('resetBtn');
      var statusLine = document.getElementById('statusLine');

      var buttons = [startBtn, stopBtn, resetBtn];
      var focusIndex = 0;
      var timerRunning = true;
      var elapsedBeforePause = 0;
      var operationalStart = new Date().getTime();
      var intervalId = null;

      var weekdays = ['воскресенье', 'понедельник', 'вторник', 'среда', 'четверг', 'пятница', 'суббота'];
      var months = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];

      function pad(n) {
        return n < 10 ? '0' + n : String(n);
      }

      function formatDuration(ms) {
        if (ms < 0 || !isFinite(ms)) ms = 0;
        var totalSeconds = Math.floor(ms / 1000);
        var hours = Math.floor(totalSeconds / 3600);
        var minutes = Math.floor((totalSeconds % 3600) / 60);
        var seconds = totalSeconds % 60;
        return pad(hours) + ':' + pad(minutes) + ':' + pad(seconds);
      }

      function getUtcTimeString(date) {
        return pad(date.getUTCHours()) + ':' + pad(date.getUTCMinutes()) + ':' + pad(date.getUTCSeconds());
      }

      function getLocalTimeString(date) {
        return pad(date.getHours()) + ':' + pad(date.getMinutes()) + ':' + pad(date.getSeconds());
      }

      function getOperationalElapsed() {
        if (timerRunning) {
          return elapsedBeforePause + (new Date().getTime() - operationalStart);
        }
        return elapsedBeforePause;
      }

      function updateButtons() {
        startBtn.disabled = timerRunning;
        stopBtn.disabled = !timerRunning;
      }

      function applyFocus() {
        for (var i = 0; i < buttons.length; i++) {
          buttons[i].classList.remove('is-focused');
        }
        if (buttons[focusIndex]) {
          buttons[focusIndex].classList.add('is-focused');
          buttons[focusIndex].focus();
        }
      }

      function render() {
        var now = new Date();
        var elapsed = getOperationalElapsed();

        utcTime.textContent = getUtcTimeString(now);
        localTime.textContent = getLocalTimeString(now);
        uptimeTime.textContent = formatDuration(elapsed);

        utcDateMain.textContent = now.getUTCDate() + ' ' + months[now.getUTCMonth()] + ' ' + now.getUTCFullYear();
        utcDateExtra.textContent = 'UTC · ' + weekdays[now.getUTCDay()];

        localDateMain.textContent = now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
        localDateExtra.textContent = weekdays[now.getDay()] + ' · местное время';

        uptimeDateMain.textContent = 'Дней: ' + Math.floor(elapsed / 86400000);
        uptimeDateExtra.textContent = 'Секунд: ' + Math.floor(elapsed / 1000) + ' · ' + (timerRunning ? 'идёт отсчёт' : 'пауза');

        statusLine.textContent = 'Статус оперативного времени: ' + (timerRunning ? 'активный отсчёт' : 'пауза');
        updateButtons();
      }

      function startLoop() {
        if (intervalId) {
          clearInterval(intervalId);
        }
        render();
        intervalId = setInterval(render, 1000);
      }

      function doStart() {
        if (timerRunning) return;
        timerRunning = true;
        operationalStart = new Date().getTime();
        render();
      }

      function doStop() {
        if (!timerRunning) return;
        elapsedBeforePause += new Date().getTime() - operationalStart;
        timerRunning = false;
        render();
      }

      function doReset() {
        elapsedBeforePause = 0;
        operationalStart = new Date().getTime();
        timerRunning = false;
        render();
      }

      startBtn.onclick = doStart;
      stopBtn.onclick = doStop;
      resetBtn.onclick = doReset;

      for (var i = 0; i < buttons.length; i++) {
        (function (index) {
          buttons[index].addEventListener('focus', function () {
            focusIndex = index;
            applyFocus();
          });
        })(i);
      }

      document.addEventListener('keydown', function (e) {
        var key = e.key || e.code || '';
        var keyCode = e.keyCode || 0;

        if (key === 'ArrowLeft' || keyCode === 37) {
          focusIndex = (focusIndex + buttons.length - 1) % buttons.length;
          applyFocus();
          e.preventDefault();
        } else if (key === 'ArrowRight' || keyCode === 39) {
          focusIndex = (focusIndex + 1) % buttons.length;
          applyFocus();
          e.preventDefault();
        } else if (key === 'Enter' || key === ' ' || key === 'Spacebar' || keyCode === 13 || keyCode === 32) {
          if (buttons[focusIndex] && !buttons[focusIndex].disabled) {
            buttons[focusIndex].click();
            e.preventDefault();
          }
        } else if (key === 'MediaPlayPause' || keyCode === 179) {
          if (timerRunning) {
            doStop();
          } else {
            doStart();
          }
          e.preventDefault();
        } else if (key === 'ColorF0Red' || keyCode === 403) {
          doReset();
          e.preventDefault();
        }
      });

      window.addEventListener('load', function () {
        startLoop();
        applyFocus();
      });

      render();
    })();
  </script>
</body>
</html>
