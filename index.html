<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Рабочая программа времени</title>
  <style>
    :root {
      --camouflage-1: rgba(16, 102, 58, 0.92);
      --camouflage-2: rgba(56, 148, 101, 0.88);
      --camouflage-3: rgba(132, 198, 122, 0.82);

      --board: rgba(171, 33, 45, 0.62);
      --board-dark: rgba(126, 22, 31, 0.66);
      --board-light: rgba(199, 66, 75, 0.52);

      --panel: rgba(255, 255, 255, 0.18);
      --panel-strong: rgba(255, 255, 255, 0.24);
      --panel-border: rgba(255, 255, 255, 0.28);

      --text: #f6f6f6;
      --text-dark: #1b1b1b;
      --focus: #ffe48a;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.26);
      --soft-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
      --radius-xl: 34px;
      --radius-lg: 24px;
      --radius-md: 18px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 12% 12%, var(--camouflage-3) 0 5%, transparent 5.5%),
        radial-gradient(circle at 24% 10%, var(--camouflage-1) 0 6%, transparent 6.5%),
        radial-gradient(circle at 37% 18%, var(--camouflage-2) 0 7%, transparent 7.5%),
        radial-gradient(circle at 52% 10%, var(--camouflage-3) 0 6%, transparent 6.5%),
        radial-gradient(circle at 66% 9%, var(--camouflage-1) 0 7%, transparent 7.5%),
        radial-gradient(circle at 81% 14%, var(--camouflage-2) 0 6%, transparent 6.5%),
        radial-gradient(circle at 95% 8%, var(--camouflage-1) 0 7%, transparent 7.5%),
        linear-gradient(180deg, #bdddb6 0%, #8cc985 100%);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2vh;
    }

    .board {
      width: 98vw;
      height: 96vh;
      background: linear-gradient(180deg, var(--board-light), var(--board) 38%, var(--board-dark));
      border-radius: var(--radius-xl);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: var(--shadow);
      padding: 2.2vh 2.2vw 2vh;
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      gap: 2vh;
    }

    .top-row,
    .time-row,
    .bottom-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.8vw;
      align-items: center;
    }

    .label-box,
    .date-box,
    .btn {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      box-shadow: var(--soft-shadow);
    }

    .label-box,
    .date-box {
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .label-box:hover,
    .date-box:hover,
    .btn:hover {
      transform: translateY(-2px);
      background: var(--panel-strong);
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.18);
    }

    .label-box {
      min-height: 13vh;
      padding: 1vh 1vw;
      font-size: clamp(24px, 2.05vw, 44px);
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: 0.01em;
      color: #ffffff;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.22);
    }

    .time-row {
      align-items: center;
      min-height: 34vh;
    }

    .time-value {
      color: #ffffff;
      font-size: clamp(56px, 5.7vw, 116px);
      font-weight: 800;
      line-height: 1;
      text-align: center;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.03em;
      text-shadow: 0 4px 16px rgba(0, 0, 0, 0.34);
      user-select: none;
    }

    .date-box {
      min-height: 15vh;
      padding: 1vh 1vw;
      flex-direction: column;
      gap: 0.6vh;
    }

    .date-main {
      font-size: clamp(24px, 1.8vw, 38px);
      font-weight: 700;
      line-height: 1.08;
      color: #ffffff;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
    }

    .date-extra {
      font-size: clamp(16px, 1vw, 24px);
      font-weight: 600;
      color: rgba(255, 255, 255, 0.84);
      line-height: 1.2;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 1vw;
      flex-wrap: nowrap;
      align-items: center;
    }

    .btn {
      min-width: 14vw;
      min-height: 8.2vh;
      padding: 0.9vh 1.2vw;
      border-radius: 20px;
      color: #ffffff;
      font-size: clamp(22px, 1.5vw, 32px);
      font-weight: 800;
      cursor: pointer;
      outline: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, opacity 0.18s ease;
      background: rgba(255, 255, 255, 0.16);
    }

    .btn:active {
      transform: translateY(1px) scale(0.99);
    }

    .btn:focus,
    .btn.is-focused {
      box-shadow: 0 0 0 5px rgba(255, 228, 138, 0.4), var(--soft-shadow);
      transform: translateY(-1px) scale(1.01);
    }

    .btn:disabled {
      opacity: 0.52;
      cursor: default;
      transform: none;
    }

    .status-line {
      color: rgba(255, 255, 255, 0.92);
      text-align: center;
      font-size: clamp(18px, 1.15vw, 26px);
      font-weight: 700;
      line-height: 1.2;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.26);
    }

    @media (max-aspect-ratio: 16/9) {
      .board { height: 97vh; }
      .label-box { min-height: 11.5vh; }
      .time-row { min-height: 28vh; }
      .date-box { min-height: 13.5vh; }
    }
  </style>
</head>
<body>
  <main class="board">
    <section class="top-row" aria-label="Названия блоков">
      <div class="label-box">Астрономическое<br>время</div>
      <div class="label-box">Местное время</div>
      <div class="label-box">Оперативное<br>время</div>
    </section>

    <section class="time-row" aria-label="Показания времени">
      <div class="time-value" id="utcTime">00:00:00</div>
      <div class="time-value" id="localTime">00:00:00</div>
      <div class="time-value" id="uptimeTime">00:00:00</div>
    </section>

    <section class="bottom-row" aria-label="Поля с датой">
      <div class="date-box">
        <div class="date-main" id="utcDateMain">—</div>
        <div class="date-extra" id="utcDateExtra">—</div>
      </div>
      <div class="date-box">
        <div class="date-main" id="localDateMain">—</div>
        <div class="date-extra" id="localDateExtra">—</div>
      </div>
      <div class="date-box">
        <div class="date-main" id="uptimeDateMain">—</div>
        <div class="date-extra" id="uptimeDateExtra">—</div>
      </div>
    </section>

    <section class="controls" aria-label="Кнопки управления">
      <button class="btn" id="startBtn" type="button" tabindex="0">Старт</button>
      <button class="btn" id="stopBtn" type="button" tabindex="0">Стоп</button>
      <button class="btn" id="resetBtn" type="button" tabindex="0">Сброс</button>
    </section>

    <div class="status-line" id="statusLine">Статус оперативного времени: активный отсчёт</div>
  </main>

  <script>
    (function () {
      var utcTime = document.getElementById('utcTime');
      var localTime = document.getElementById('localTime');
      var uptimeTime = document.getElementById('uptimeTime');

      var utcDateMain = document.getElementById('utcDateMain');
      var utcDateExtra = document.getElementById('utcDateExtra');
      var localDateMain = document.getElementById('localDateMain');
      var localDateExtra = document.getElementById('localDateExtra');
      var uptimeDateMain = document.getElementById('uptimeDateMain');
      var uptimeDateExtra = document.getElementById('uptimeDateExtra');

      var startBtn = document.getElementById('startBtn');
      var stopBtn = document.getElementById('stopBtn');
      var resetBtn = document.getElementById('resetBtn');
      var statusLine = document.getElementById('statusLine');

      var buttons = [startBtn, stopBtn, resetBtn];
      var focusIndex = 0;
      var timerRunning = true;
      var elapsedBeforePause = 0;
      var operationalStart = new Date().getTime();
      var intervalId = null;

      var weekdays = ['воскресенье', 'понедельник', 'вторник', 'среда', 'четверг', 'пятница', 'суббота'];
      var months = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];

      function pad(n) { return n < 10 ? '0' + n : String(n); }
      function formatDuration(ms) {
        if (ms < 0 || !isFinite(ms)) ms = 0;
        var totalSeconds = Math.floor(ms / 1000);
        var hours = Math.floor(totalSeconds / 3600);
        var minutes = Math.floor((totalSeconds % 3600) / 60);
        var seconds = totalSeconds % 60;
        return pad(hours) + ':' + pad(minutes) + ':' + pad(seconds);
      }
      function getUtcTimeString(date) { return pad(date.getUTCHours()) + ':' + pad(date.getUTCMinutes()) + ':' + pad(date.getUTCSeconds()); }
      function getLocalTimeString(date) { return pad(date.getHours()) + ':' + pad(date.getMinutes()) + ':' + pad(date.getSeconds()); }
      function getOperationalElapsed() { return timerRunning ? elapsedBeforePause + (new Date().getTime() - operationalStart) : elapsedBeforePause; }

      function updateButtons() {
        startBtn.disabled = timerRunning;
        stopBtn.disabled = !timerRunning;
      }

      function applyFocus() {
        for (var i = 0; i < buttons.length; i++) buttons[i].classList.remove('is-focused');
        if (buttons[focusIndex]) {
          buttons[focusIndex].classList.add('is-focused');
          buttons[focusIndex].focus();
        }
      }

      function render() {
        var now = new Date();
        var elapsed = getOperationalElapsed();

        utcTime.textContent = getUtcTimeString(now);
        localTime.textContent = getLocalTimeString(now);
        uptimeTime.textContent = formatDuration(elapsed);

        utcDateMain.textContent = now.getUTCDate() + ' ' + months[now.getUTCMonth()] + ' ' + now.getUTCFullYear();
        utcDateExtra.textContent = 'UTC · ' + weekdays[now.getUTCDay()];

        localDateMain.textContent = now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
        localDateExtra.textContent = weekdays[now.getDay()] + ' · местное время';

        uptimeDateMain.textContent = 'Дней: ' + Math.floor(elapsed / 86400000);
        uptimeDateExtra.textContent = 'Секунд: ' + Math.floor(elapsed / 1000) + ' · ' + (timerRunning ? 'идёт отсчёт' : 'пауза');

        statusLine.textContent = 'Статус оперативного времени: ' + (timerRunning ? 'активный отсчёт' : 'пауза');
        updateButtons();
      }

      function startLoop() {
        if (intervalId) clearInterval(intervalId);
        render();
        intervalId = setInterval(render, 1000);
      }

      function doStart() {
        if (timerRunning) return;
        timerRunning = true;
        operationalStart = new Date().getTime();
        render();
      }

      function doStop() {
        if (!timerRunning) return;
        elapsedBeforePause += new Date().getTime() - operationalStart;
        timerRunning = false;
        render();
      }

      function doReset() {
        elapsedBeforePause = 0;
        operationalStart = new Date().getTime();
        timerRunning = false;
        render();
      }

      startBtn.onclick = doStart;
      stopBtn.onclick = doStop;
      resetBtn.onclick = doReset;

      for (var i = 0; i < buttons.length; i++) {
        (function (index) {
          buttons[index].addEventListener('focus', function () {
            focusIndex = index;
            applyFocus();
          });
        })(i);
      }

      document.addEventListener('keydown', function (e) {
        var key = e.key || e.code || '';
        var keyCode = e.keyCode || 0;

        if (key === 'ArrowLeft' || keyCode === 37) {
          focusIndex = (focusIndex + buttons.length - 1) % buttons.length;
          applyFocus();
          e.preventDefault();
        } else if (key === 'ArrowRight' || keyCode === 39) {
          focusIndex = (focusIndex + 1) % buttons.length;
          applyFocus();
          e.preventDefault();
        } else if (key === 'Enter' || key === ' ' || key === 'Spacebar' || keyCode === 13 || keyCode === 32) {
          if (buttons[focusIndex] && !buttons[focusIndex].disabled) {
            buttons[focusIndex].click();
            e.preventDefault();
          }
        } else if (key === 'MediaPlayPause' || keyCode === 179) {
          if (timerRunning) doStop(); else doStart();
          e.preventDefault();
        } else if (key === 'ColorF0Red' || keyCode === 403) {
          doReset();
          e.preventDefault();
        }
      });

      window.addEventListener('load', function () {
        startLoop();
        applyFocus();
      });

      render();
    })();
  </script>
</body>
</html>
